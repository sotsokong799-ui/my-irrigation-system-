<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Irrigation System</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>

    <div class="header">
        <h1>🌱 IoT Irrigation Dashboard</h1>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Soil Moisture</h3>
            <h1 id="soil">0%</h1>
        </div>

        <div class="card">
            <h3>AC Voltage</h3> 
            <h1 id="volt">0.0 V</h1> 
        </div>

        <div class="card">
            <h3>Tank Level</h3>
            <h1 id="tank">---</h1>
        </div>

        <div class="card">
            <h3>Water Flow</h3>
            <h1 id="flow">0.0 L/min</h1>
        </div>

        <div class="card">
            <h3>Pump Status</h3>
            <h1 id="pump">OFF</h1>
        </div>
    </div>

    <div class="buttons">
        <button class="green" onclick="pumpOn()">START</button>
        <button class="red" onclick="pumpOff()">STOP</button> 
        <button class="blue" id="btn-auto" onclick="autoMode()">AUTO</button> 
        <button class="orange" id="btn-manual" onclick="manualMode()">MANUAL</button> 
    </div>

    <div class="chartbox" style="max-width: 900px; margin: 30px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h3 style="text-align: center; color: #333; margin-bottom: 15px; border-bottom: 2px solid #2ecc71; padding-bottom: 8px;">
            📜 System Activity History
        </h3>
        
        <div id="historyLog" style="max-height: 250px; overflow-y: auto; font-family: 'Courier New', Courier, monospace; font-size: 14px; background: #f8f9fa; padding: 15px; border-radius: 5px; border: 1px solid #ddd;">
            <div style="color: #888; text-align: center;">No activity recorded yet.</div>
        </div>
    </div>

    <script src="For MQTT.js"></script> 

</body>
</html>
